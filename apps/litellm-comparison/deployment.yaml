# LiteLLM standalone deployment — M4 Step 4(c).
#
# Two things in here:
#   1. ConfigMap holding litellm/config.yaml (model routing).
#   2. Deployment + ClusterIP Service exposing port 4000.
#
# The Secret `litellm-creds` (master-key + AOAI base/key) is created
# OUT OF BAND by the facilitator's `scripts/bootstrap-attendees.sh`
# so attendee `kubectl apply` doesn't overwrite real credentials with
# placeholders. Verify before applying this manifest:
#
#   kubectl get secret litellm-creds -n "$NS"      # must exist
#
# If missing, ask your facilitator to re-run `bootstrap-attendees.sh`.
#
# Apply with:
#   kubectl apply -n "$NS" -f apps/litellm-comparison/deployment.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
data:
  config.yaml: |
    model_list:
      - model_name: gpt-5-mini-via-litellm
        litellm_params:
          model: azure/gpt-5-mini
          api_base: os.environ/AZURE_API_BASE
          api_key: os.environ/AZURE_API_KEY
          api_version: "2024-10-21"
    litellm_settings:
      drop_params: true
      num_retries: 2
      request_timeout: 60
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  labels:
    app: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: proxy
          # Mirrored from ghcr.io/berriai/litellm:main-stable into the
          # workshop ACR so attendees pull from a private registry that
          # already has an AcrPull role binding from the AKS kubelet
          # identity — no Docker Hub / GHCR rate-limit drama.
          image: ${ACR_LOGIN_SERVER}/litellm:main-stable
          imagePullPolicy: IfNotPresent
          args: ["--config", "/etc/litellm/config.yaml", "--port", "4000"]
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-creds
                  key: master-key
            - name: AZURE_API_BASE
              valueFrom:
                secretKeyRef:
                  name: litellm-creds
                  key: azure-api-base
            - name: AZURE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-creds
                  key: azure-api-key
          volumeMounts:
            - name: config
              mountPath: /etc/litellm
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: litellm-config
            items:
              - key: config.yaml
                path: config.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  labels:
    app: litellm
spec:
  type: ClusterIP
  selector:
    app: litellm
  ports:
    - port: 4000
      targetPort: 4000
      name: http
