apiVersion: v1
kind: Secret
metadata:
  name: content-safety-billing
  namespace: content-safety
type: Opaque
stringData:
  billing: "https://<your-cs-resource>.cognitiveservices.azure.com"
  key: "REPLACE_ME"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: content-safety
  namespace: content-safety
  labels:
    app: content-safety
spec:
  replicas: 1
  selector:
    matchLabels:
      app: content-safety
  template:
    metadata:
      labels:
        app: content-safety
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
        workload: content-safety
      tolerations:
        - key: sku
          operator: Equal
          value: gpu
          effect: NoSchedule
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: text-analyze
          # Mirrored from mcr.microsoft.com/azure-cognitive-services/contentsafety/text-analyze:latest
          # into the workshop ACR. AKS kubelet identity has AcrPull on the
          # ACR, so no imagePullSecret is needed.
          image: ${ACR_LOGIN_SERVER}/contentsafety-text-analyze:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: Eula
              value: accept
            - name: Billing
              valueFrom:
                secretKeyRef:
                  name: content-safety-billing
                  key: billing
            - name: ApiKey
              valueFrom:
                secretKeyRef:
                  name: content-safety-billing
                  key: key
          resources:
            requests:
              cpu: 2000m
              memory: 4Gi
              nvidia.com/gpu: 1
            limits:
              cpu: 4000m
              memory: 8Gi
              nvidia.com/gpu: 1
          readinessProbe:
            httpGet:
              path: /status
              port: 5000
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /status
              port: 5000
            initialDelaySeconds: 120
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: content-safety
  namespace: content-safety
spec:
  type: ClusterIP
  selector:
    app: content-safety
  ports:
    - port: 5000
      targetPort: 5000
