apiVersion: v1
kind: Namespace
metadata:
  name: language-pii
---
apiVersion: v1
kind: Secret
metadata:
  name: language-pii-billing
  namespace: language-pii
type: Opaque
stringData:
  # ENDPOINT URI of an Azure AI Language (Foundry Tools) S0 resource. Same
  # billing model as apps/content-safety-cpu: container reports usage every
  # 10–15 min to this endpoint; actual prompt/completion data never leaves
  # the cluster. Pick whichever Azure region is closest to your AKS for the
  # billing resource — it does not have to match the AKS region.
  billing: "https://<your-language-resource>.cognitiveservices.azure.com"
  # API key of the same Azure AI Language resource (used only for billing).
  key: "REPLACE_ME"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: language-pii
  namespace: language-pii
  labels:
    app: language-pii
spec:
  # 1 replica is enough for the workshop (Presidio is the orchestrator and
  # absorbs the bulk of /redact traffic). Scale up only if you observe
  # `text-analytics-pii` queue saturation in container logs.
  replicas: 1
  selector:
    matchLabels:
      app: language-pii
  template:
    metadata:
      labels:
        app: language-pii
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: text-analytics-pii
          # Mirrored from mcr.microsoft.com/azure-cognitive-services/textanalytics/pii:latest
          # into the workshop ACR. AKS kubelet identity has AcrPull on the
          # ACR, so no imagePullSecret is needed.
          # Source:
          #   https://learn.microsoft.com/azure/ai-services/language-service/personally-identifiable-information/how-to/use-containers
          image: ${ACR_LOGIN_SERVER}/textanalytics-pii:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: Eula
              value: accept
            - name: Billing
              valueFrom:
                secretKeyRef:
                  name: language-pii-billing
                  key: billing
            - name: ApiKey
              valueFrom:
                secretKeyRef:
                  name: language-pii-billing
                  key: key
          resources:
            # MS Learn minimum: 1 CPU, 8 GB RAM. We keep the request half
            # of the limit so the bin-packs nicely on a 4-vCPU node.
            requests:
              cpu: 1000m
              memory: 8Gi
            limits:
              cpu: 2000m
              memory: 8Gi
          readinessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: language-pii
  namespace: language-pii
  labels:
    app: language-pii
spec:
  type: ClusterIP
  selector:
    app: language-pii
  ports:
    - name: http
      port: 5000
      targetPort: http
      protocol: TCP
---
# Only the Presidio orchestrator namespace should reach this service.
# Attendee Pods talk to Presidio, not to Language directly.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: language-pii-allow-presidio
  namespace: language-pii
spec:
  podSelector:
    matchLabels:
      app: language-pii
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: presidio
      ports:
        - port: 5000
          protocol: TCP
